name: CI/CD plataforma-educativa

on:
  push:
    branches:
    - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Paso 1: Clonar el repositorio
    - name: Clonar repositorio
      uses: actions/checkout@v3

    # Paso 2: Configurar Java 21
    - name: Configurar Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    # Paso 3: Compilar bff-inscripciones
    - name: Compilar bff-inscripciones
      working-directory: ./bff-inscripciones
      run: mvn clean package -DskipTests

    # Paso 4: Compilar cursos-service
    - name: Compilar cursos-service
      working-directory: ./cursos-service
      run: mvn clean package -DskipTests

    # Paso 5: Iniciar sesion en Docker Hub
    - name: Iniciar sesion en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Paso 6: Construir y publicar imagen de bff-inscripciones
    - name: Construir y publicar imagen bff-inscripciones
      uses: docker/build-push-action@v5
      with:
        context: ./bff-inscripciones
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest

    # Paso 7: Construir y publicar imagen de cursos-service
    - name: Construir y publicar imagen cursos-service
      uses: docker/build-push-action@v5
      with:
        context: ./cursos-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest

    # Paso 8: Desplegar ambos microservicios en EC2 via SSH
    - name: Desplegar en EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker network create plataforma-network || true

          docker stop rabbitmq-plataforma || true
          docker rm rabbitmq-plataforma || true
          docker run -d --name rabbitmq-plataforma \
            --network plataforma-network \
            -p 5673:5672 \
            -p 15673:15672 \
            rabbitmq:3-management
          sleep 10

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest
          docker stop bff-inscripciones || true
          docker rm bff-inscripciones || true
          docker run -d --name bff-inscripciones \
            --network plataforma-network \
            -p 8081:8081 \
            -e AWS_REGION=us-east-1 \
            -e AWS_S3_BUCKET=${{ secrets.S3_BUCKET_NAME }} \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
            -e SPRING_RABBITMQ_HOST=rabbitmq-plataforma \
            ${{ secrets.DOCKERHUB_USERNAME }}/bff-inscripciones:latest

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest
          docker stop cursos-service || true
          docker rm cursos-service || true
          docker run -d --name cursos-service \
            --network plataforma-network \
            -v /home/ec2-user/wallet_gestionPedidos:/wallet_gestionPedidos \
            -p 8082:8082 \
            -e SPRING_DATASOURCE_URL="jdbc:oracle:thin:@gestionpedidos_medium?TNS_ADMIN=/wallet_gestionPedidos" \
            -e SPRING_DATASOURCE_USERNAME=ADMIN \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.ORACLE_PASSWORD }} \
            -e SPRING_RABBITMQ_HOST=rabbitmq-plataforma \
            ${{ secrets.DOCKERHUB_USERNAME }}/cursos-service:latest
